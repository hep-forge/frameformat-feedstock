{% set versions = {
    "1.0.0": "59dbfeb11e9a5765f8d29dc4237c818aaad36bf2",
    "0.1": "29bec103832ea93c37fd68d71e3555c47df26219"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

package:
  name: {{ environ.get('ANACONDA_PACKAGE', "framel-root")|string|lower }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  git_url: "https://git.ligo.org/kagra/libraries-addons/root/framel"
  git_rev: "{{ version }}"

build:
  # ADD_ROOT_LIBRARY() (root-plus's shared cmake/Modules/RootFramework.cmake)
  # installs a precompiled Clang module cache (lib/*.pcm) for each library
  # this recipe builds. conda-build's default prefix-relocation does a
  # naive text substitution on every installed file it doesn't know to
  # skip, which corrupts that binary format. Same fix as root-feedstock
  # and root-plus-feedstock use for the identical artifact.
  ignore_prefix_files:
    - lib/*.pcm

requirements:
  build:
    - {{ compiler('cxx') }} # [linux]
    - {{ compiler('c') }}   # [linux]
    - {{ stdlib('c') }}

    - clang
    - cmake
    - make

    - cuda-nvcc

  host:
    - root-plus
    - framel

  run:
    - root-plus
    - framel

about:
  home: "https://git.ligo.org/kagra/libraries-addons/root/framel"
  license: "GPL-3.0"
  summary: "Frame Format Library"
  description: |
    Frame format library is an ROOT adapter to read GWF files using FrameL library include multithreading

extra:
  recipe-maintainers:
    - meiyasan
